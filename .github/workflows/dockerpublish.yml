name: Docker

on:
  push:
    # Publish master's build as the `latest` image.
    branches:
      - master

  # Run tests for any PRs.
  pull_request:

jobs:
  # Run tests.
  test:
    # Ensure latest python image is mirrored before running tests.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and Start Images
        run: |
          cp template.env .env
          docker compose up -d --build
      - name: Validate deploy overlay merge
        # CI builds and starts the base above; the toolkit additionally layers
        # docker-compose.deploy.yml. Validate that merge too so an overlay typo
        # fails here instead of stalling the toolkit's redeploy on the VM.
        run: |
          docker compose -f docker-compose.yml -f docker-compose.deploy.yml config -q
      - name: Run tests
        run: |
          docker compose exec -T externallinks /app/bin/django_wait_for_db.sh python django_wait_for_migrations.py test

  # Push images to quay.io/wikipedialibrary.
  push:
    # Ensure test job passes before pushing images.
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log into quay.io
        run: echo "${{ secrets.CR_PASSWORD }}" | docker login quay.io -u ${{ secrets.CR_USERNAME }} --password-stdin

      - name: Build Images
        run: |
          cp template.env .env
          docker compose build

      - name: Set commit tag
        id: commit
        run: |
          # Short git commit object name, prefixed so the tag is self-describing.
          echo "tag=commit_${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Push images to quay.io/wikipedialibrary
        run: |
          commit_tag=${{ steps.commit.outputs.tag }}
          # Each build-target image, tagged :latest by `docker compose build`.
          for image in externallinks eventstream externallinks_cron; do
            image_name=quay.io/wikipedialibrary/${image}
            echo "== pushing ${image_name} =="
            docker tag ${image_name}:latest ${image_name}:${commit_tag}
            docker push ${image_name}:latest
            docker push ${image_name}:${commit_tag}
          done
